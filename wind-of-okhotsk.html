    <style>
      .wind-grid-page {
        flex: 1 1 auto;
        width: 100%;
        margin-left: 0;
        justify-content: center;
      }

      .wind-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
        width: min(1200px, var(--content-area-width));
      }

      .wind-grid img {
        display: block;
        width: 100%;
        height: auto;
        cursor: pointer;
      }

      .lightbox {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.78);
        opacity: 0;
        pointer-events: none;
        transition: opacity 420ms ease;
      }

      .lightbox.is-open {
        opacity: 1;
        pointer-events: auto;
      }

      .lightbox img {
        display: block;
        max-width: min(1000px, calc(100vw - 120px));
        max-height: max(240px, calc(100vh - 120px));
        width: auto;
        height: auto;
        opacity: 1;
        transition: opacity 420ms ease;
      }

      .lightbox img.is-fading {
        opacity: 0;
      }

      .lightbox-image-wrap {
        position: relative;
        display: inline-block;
        line-height: 0;
      }

      .lightbox-image-wrap,
      .lightbox-image-hit {
        cursor: none;
      }

      .lightbox-image-hit {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 50%;
        padding: 0;
        border: 0;
        background: transparent;
      }

      .lightbox-image-hit--previous {
        left: 0;
      }

      .lightbox-image-hit--next {
        right: 0;
      }

      .lightbox-cursor {
        position: fixed;
        z-index: 102;
        display: none;
        color: #000000;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 22px;
        font-weight: 400;
        line-height: 1;
        pointer-events: none;
        text-shadow:
          0 1px 0 #ffffff,
          1px 0 0 #ffffff,
          0 -1px 0 #ffffff,
          -1px 0 0 #ffffff;
        transform: translate(-50%, -50%);
      }

      .lightbox-image-wrap:hover .lightbox-cursor {
        display: block;
      }
    </style>
  </head>

    <div class="lightbox" aria-modal="true" role="dialog" aria-label="Wind of Okhotsk image viewer">
      <div class="lightbox-image-wrap">
        <img src="./public/images/wind-of-okhotsk/01.jpg?v=20260522" alt="" />
        <button class="lightbox-image-hit lightbox-image-hit--previous" type="button" aria-label="Previous image"></button>
        <button class="lightbox-image-hit lightbox-image-hit--next" type="button" aria-label="Next image"></button>
        <span class="lightbox-cursor" aria-hidden="true">→</span>
      </div>

    <script>
      const gridImages = Array.from(document.querySelectorAll('.wind-grid img'));
      const lightbox = document.querySelector('.lightbox');
      const lightboxImage = lightbox.querySelector('img');
      const lightboxImageWrap = document.querySelector('.lightbox-image-wrap');
      const imagePrevious = document.querySelector('.lightbox-image-hit--previous');
      const imageNext = document.querySelector('.lightbox-image-hit--next');
      const lightboxCursor = document.querySelector('.lightbox-cursor');
      let currentImageIndex = 0;

      function showLightboxImage(index) {
        currentImageIndex = (index + gridImages.length) % gridImages.length;
        const image = gridImages[currentImageIndex];
        lightboxImage.src = image.src;
        lightboxImage.alt = image.alt;
      }

      function transitionLightboxImage(index) {
        currentImageIndex = (index + gridImages.length) % gridImages.length;
        const image = gridImages[currentImageIndex];
        lightboxImage.classList.add('is-fading');
        window.setTimeout(() => {
          lightboxImage.src = image.src;
          lightboxImage.alt = image.alt;
        }, 360);
      }

      function openLightbox(index) {
        showLightboxImage(index);
        lightboxImage.classList.add('is-fading');
        lightbox.classList.add('is-open');
        window.requestAnimationFrame(() => {
          lightboxImage.classList.remove('is-fading');
        });
      }

      function closeLightbox(event) {
        if (event.target === lightbox) {
          lightbox.classList.remove('is-open');
        }
      }

      gridImages.forEach((image, index) => {
        image.addEventListener('click', () => {
          if (window.matchMedia('(max-width: 720px)').matches) return;
          openLightbox(index);
        });
      });

      imagePrevious.addEventListener('click', () => transitionLightboxImage(currentImageIndex - 1));
      imageNext.addEventListener('click', () => transitionLightboxImage(currentImageIndex + 1));
      lightboxImageWrap.addEventListener('mousemove', (event) => {
        const rect = lightboxImageWrap.getBoundingClientRect();
        const isPreviousSide = event.clientX < rect.left + rect.width / 2;
        lightboxCursor.textContent = isPreviousSide ? '←' : '→';
        lightboxCursor.style.left = `${event.clientX}px`;
        lightboxCursor.style.top = `${event.clientY}px`;
      });
      lightbox.addEventListener('click', closeLightbox);
      lightboxImage.addEventListener('load', () => {
        window.requestAnimationFrame(() => lightboxImage.classList.remove('is-fading'));
      });
      document.addEventListener('keydown', (event) => {
        if (!lightbox.classList.contains('is-open')) return;
        if (event.key === 'Escape') lightbox.classList.remove('is-open');
        if (event.key === 'ArrowLeft') transitionLightboxImage(currentImageIndex - 1);
        if (event.key === 'ArrowRight') transitionLightboxImage(currentImageIndex + 1);
      });
    </script>
    <script>
      document.querySelectorAll('.mobile-menu-toggle').forEach((toggle) => {
        const sidebar = toggle.closest('.sidebar');
        if (!sidebar) return;
        toggle.addEventListener('click', () => {
          const isOpen = sidebar.classList.toggle('is-open');
          toggle.setAttribute('aria-expanded', String(isOpen));
        });
      });
    </script>
