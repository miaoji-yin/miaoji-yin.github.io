<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>American Dream Park - YIN Ying</title>
    <link rel="stylesheet" href="../src/styles.css?v=20260524-responsive" />
    <style>
      .gallery-page {
        flex: 1 1 auto;
        width: 100%;
        margin-left: 0;
        justify-content: flex-start;
      }

      .gallery-frame,
      .gallery-image-wrap {
        width: auto;
      }

      .gallery-frame .artwork-image {
        width: auto;
        height: auto;
        max-width: var(--image-max-width);
        max-height: var(--image-max-height);
      }

      .image-cursor {
        position: fixed;
        z-index: 20;
        display: none;
        color: #000000;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 22px;
        font-weight: 400;
        line-height: 1;
        pointer-events: none;
        text-shadow:
          0 1px 0 #ffffff,
          1px 0 0 #ffffff,
          0 -1px 0 #ffffff,
          -1px 0 0 #ffffff;
        transform: translate(-50%, -50%);
      }

      .gallery-image-wrap:hover .image-cursor {
        display: block;
      }

      .gallery-image-wrap,
      .gallery-image-hit {
        cursor: none;
      }
    </style>
  </head>
  <body>
    <div class="site-shell">
      <aside class="sidebar" aria-label="Site navigation">
        <a class="identity" href="../">
          <span class="identity__name">YIN Ying</span>
          <span class="identity__chinese"><span>殷     </span><span class="identity__chinese-second">鶯</span></span>
        </a>

        <button class="mobile-menu-toggle" type="button" aria-expanded="false">Menu</button>

        <nav class="site-nav">
          <div class="project-links">
            <a href="../the-flowing-river-never-stops/">The flowing river never stops</a>
            <a href="../living-by-the-river/">Living by the river</a>
            <a href="../hypnopompic-hallucinations/">Hypnopompic Hallucinations</a>
            <a href="../wind-of-okhotsk/">Wind of Okhotsk</a>
            <a href="../american-dream-park/" aria-current="page">American Dream Park</a>
            <a href="../traces-of-sentience/">Traces of Sentience</a>
          </div>

          <div class="utility-links">
            <a href="../about/">About</a>
            <a href="../contact/">Contact</a>
          </div>
        </nav>
      </aside>

      <main class="content">
        <article class="gallery-page gallery-page--american" aria-label="American Dream Park">
          <div class="gallery-frame">
            <div class="gallery-image-wrap">
              <img class="artwork-image" src="../public/images/american-dream-park/01.jpg?v=20260522" alt="American Dream Park 01" />
              <button class="gallery-image-hit gallery-image-hit--previous" type="button" aria-label="Previous image"></button>
              <button class="gallery-image-hit gallery-image-hit--next" type="button" aria-label="Next image"></button>
              <span class="image-cursor" aria-hidden="true">→</span>
            </div>
            <div class="mobile-image-list" aria-label="Mobile image list"></div>
          </div>
        </article>
      </main>
    </div>

    <script>
      const images = Array.from({ length: 15 }, (_, index) => {
        const number = String(index + 1).padStart(2, '0');
        return {
          src: `../public/images/american-dream-park/${number}.jpg?v=20260522`,
          alt: `American Dream Park ${number}`,
        };
      });

      let currentIndex = 0;
      const image = document.querySelector('.gallery-frame img');
      const imagePrevious = document.querySelector('.gallery-image-hit--previous');
      const imageNext = document.querySelector('.gallery-image-hit--next');
      const imageCursor = document.querySelector('.image-cursor');
      const imageWrap = document.querySelector('.gallery-image-wrap');
      const mobileImageList = document.querySelector('.mobile-image-list');

      function populateMobileImages() {
        if (!mobileImageList || mobileImageList.children.length) return;
        images.forEach((item) => {
          const mobileImage = document.createElement('img');
          mobileImage.src = item.src;
          mobileImage.alt = item.alt;
          mobileImage.loading = 'lazy';
          mobileImageList.appendChild(mobileImage);
        });
      }

      populateMobileImages();

      function showImage(index) {
        currentIndex = (index + images.length) % images.length;
        image.classList.add('is-fading');
        window.setTimeout(() => {
          image.src = images[currentIndex].src;
          image.alt = images[currentIndex].alt;
        }, 360);
      }

      function updateFrameSize() {
        if (!image.naturalWidth || !image.naturalHeight) return;
        const availableWidth = Math.min(800, Math.max(240, window.innerWidth - 340));
        const availableHeight = Math.max(240, window.innerHeight - 120);
        const scale = Math.min(1, availableWidth / image.naturalWidth, availableHeight / image.naturalHeight);
        const width = Math.round(image.naturalWidth * scale);
        const height = Math.round(image.naturalHeight * scale);

        image.style.width = `${width}px`;
        image.style.height = `${height}px`;
        imageWrap.style.width = `${width}px`;
        imageWrap.style.height = `${height}px`;
      }
      imagePrevious.addEventListener('click', () => showImage(currentIndex - 1));
      imageNext.addEventListener('click', () => showImage(currentIndex + 1));
      imageWrap.addEventListener('mousemove', (event) => {
        const rect = imageWrap.getBoundingClientRect();
        const isPreviousSide = event.clientX < rect.left + rect.width / 2;
        imageCursor.textContent = isPreviousSide ? '←' : '→';
        imageCursor.style.left = `${event.clientX}px`;
        imageCursor.style.top = `${event.clientY}px`;
      });
      image.addEventListener('load', () => {
        updateFrameSize();
        window.requestAnimationFrame(() => image.classList.remove('is-fading'));
      });
      window.addEventListener('resize', updateFrameSize);
      if (image.complete) updateFrameSize();
    </script>
    <script>
      document.querySelectorAll('.mobile-menu-toggle').forEach((toggle) => {
        const sidebar = toggle.closest('.sidebar');
        if (!sidebar) return;
        toggle.addEventListener('click', () => {
          const isOpen = sidebar.classList.toggle('is-open');
          toggle.setAttribute('aria-expanded', String(isOpen));
        });
      });
    </script>
    <div class="site-copyright">Copyright © 2026 Ying Yin</div>
  </body>
</html>
