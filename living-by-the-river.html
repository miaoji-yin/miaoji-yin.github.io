<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Living by the river - YIN Ying</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <style>
      .gallery-page.gallery-page--living {
        flex: 1 1 auto;
        width: 100%;
        margin-left: 0;
        justify-content: center;
      }

      .gallery-page--living .gallery-frame,
      .gallery-page--living .gallery-image-wrap,
      .gallery-page--living .gallery-controls {
        width: auto;
      }

      .gallery-page--living .gallery-frame .artwork-image {
        width: auto;
        height: auto;
        width: 650px;
        max-width: none;
        max-height: none;
      }

      .image-cursor {
        position: fixed;
        z-index: 20;
        display: none;
        color: #000000;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 22px;
        font-weight: 400;
        line-height: 1;
        pointer-events: none;
        text-shadow:
          0 1px 0 #ffffff,
          1px 0 0 #ffffff,
          0 -1px 0 #ffffff,
          -1px 0 0 #ffffff;
        transform: translate(-50%, -50%);
      }

      .gallery-image-wrap:hover .image-cursor {
        display: block;
      }

      .gallery-page--living .gallery-image-wrap,
      .gallery-page--living .gallery-image-hit {
        cursor: none;
      }
    </style>
  </head>
  <body>
    <div class="site-shell">
      <aside class="sidebar" aria-label="Site navigation">
        <a class="identity" href="./index.html">
          <span class="identity__name">YIN Ying</span>
          <span class="identity__chinese"><span>殷     </span><span class="identity__chinese-second">鶯</span></span>
        </a>

        <nav class="site-nav">
          <div class="project-links">
            <a href="./the-flowing-river-never-stops.html">The flowing river never stops</a>
            <a href="./living-by-the-river.html" aria-current="page">Living by the river</a>
            <a href="./hypnopompic-hallucinations.html">Hypnopompic Hallucinations</a>
            <a href="./wind-of-okhotsk.html">Wind of Okhotsk</a>
            <a href="./american-dream-park.html">American Dream Park</a>
            <a href="./traces-of-sentience.html">Traces of Sentience</a>
          </div>

          <div class="utility-links">
            <a href="./about.html">About</a>
            <a href="./contact.html">Contact</a>
          </div>
        </nav>
      </aside>

      <main class="content">
        <article class="gallery-page gallery-page--living" aria-label="Living by the river">
          <div class="gallery-frame">
            <div class="gallery-image-wrap">
              <img class="artwork-image" src="./public/images/living-by-the-river/01.jpg" alt="Living by the river 01" />
              <button class="gallery-image-hit gallery-image-hit--previous" type="button" aria-label="Previous image"></button>
              <button class="gallery-image-hit gallery-image-hit--next" type="button" aria-label="Next image"></button>
              <span class="image-cursor" aria-hidden="true">→</span>
            </div>
            <div class="gallery-controls">
              <button class="gallery-control gallery-control--previous" type="button" aria-label="Previous image">&lt;</button>
              <button class="gallery-control gallery-control--next" type="button" aria-label="Next image">&gt;</button>
            </div>
          </div>
        </article>
      </main>
    </div>

    <script>
      const images = Array.from({ length: 7 }, (_, index) => {
        const number = String(index + 1).padStart(2, '0');
        return {
          src: `./public/images/living-by-the-river/${number}.jpg`,
          alt: `Living by the river ${number}`,
        };
      });

      let currentIndex = 0;
      const image = document.querySelector('.gallery-frame img');
      const previous = document.querySelector('.gallery-control--previous');
      const next = document.querySelector('.gallery-control--next');
      const imagePrevious = document.querySelector('.gallery-image-hit--previous');
      const imageNext = document.querySelector('.gallery-image-hit--next');
      const imageCursor = document.querySelector('.image-cursor');
      const imageWrap = document.querySelector('.gallery-image-wrap');

      function showImage(index) {
        currentIndex = (index + images.length) % images.length;
        image.classList.add('is-fading');
        window.setTimeout(() => {
          image.src = images[currentIndex].src;
          image.alt = images[currentIndex].alt;
        }, 360);
      }

      function updateFrameSize() {
        const imageWrap = document.querySelector('.gallery-image-wrap');
        const controls = document.querySelector('.gallery-controls');
        const width = 650;
        const height = Math.round(width * image.naturalHeight / image.naturalWidth);

        image.style.width = `${width}px`;
        image.style.height = `${height}px`;
        imageWrap.style.width = `${width}px`;
        imageWrap.style.height = `${height}px`;
        controls.style.width = `${width}px`;
      }

      previous.addEventListener('click', () => showImage(currentIndex - 1));
      next.addEventListener('click', () => showImage(currentIndex + 1));
      imagePrevious.addEventListener('click', () => showImage(currentIndex - 1));
      imageNext.addEventListener('click', () => showImage(currentIndex + 1));
      imageWrap.addEventListener('mousemove', (event) => {
        const rect = imageWrap.getBoundingClientRect();
        const isPreviousSide = event.clientX < rect.left + rect.width / 2;
        imageCursor.textContent = isPreviousSide ? '←' : '→';
        imageCursor.style.left = `${event.clientX}px`;
        imageCursor.style.top = `${event.clientY}px`;
      });
      image.addEventListener('load', () => {
        updateFrameSize();
        window.requestAnimationFrame(() => image.classList.remove('is-fading'));
      });
      if (image.complete) updateFrameSize();
    </script>
  </body>
</html>
